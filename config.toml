enable-magisk-update = true
parallel-jobs = 1

[YouTube-RV]
app-name = "YouTube"
rv-brand = "RV"
build-mode = "both"
apkmirror-dlurl = "https://apkmirror.com/apk/google-inc/youtube/"
uptodown-dlurl = "https://youtube.en.uptodown.com/android"

[Music-RV]
app-name = "Music"
rv-brand = "RV"
build-mode = "both"
apkmirror-dlurl = "https://apkmirror.com/apk/google-inc/youtube-music/"
uptodown-dlurl = "https://youtube-music.en.uptodown.com/android"
arch = "arm64-v8a"

[Photos-RV]
app-name = "Photos"
rv-brand = "RV"
build-mode = "both"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/photos/"
uptodown-dlurl = "https://google-photos.en.uptodown.com/android"
arch = "arm64-v8a"

[YouTube-RVX]
app-name = "YouTube"
patches-source = "inotia00/revanced-patches"
cli-source = "inotia00/revanced-cli"
rv-brand = "RVX"
build-mode = "both"
patcher-args = "-e 'Custom branding icon for YouTube' -OappIcon='revancify_red'"
included-patches = "'Custom header for YouTube' 'MaterialYou'"
apkmirror-dlurl = "https://apkmirror.com/apk/google-inc/youtube/"
uptodown-dlurl = "https://youtube.en.uptodown.com/android"

[Music-RVX]
app-name = "Music"
patches-source = "inotia00/revanced-patches"
cli-source = "inotia00/revanced-cli"
rv-brand = "RVX"
build-mode = "both"
patcher-args = "-e 'Custom branding icon for YouTube Music' -OappIcon='revancify_red' -e 'Custom branding name for YouTube Music' -OappNameNotification='Music' -OappNameLauncher='Music'"
included-patches = "'Custom header for YouTube Music'"
apkmirror-dlurl = "https://apkmirror.com/apk/google-inc/youtube-music/"
uptodown-dlurl = "https://youtube-music.en.uptodown.com/android"
arch = "arm64-v8a"

[YouTube-anddea]
app-name = "YouTube"
patches-source = "anddea/revanced-patches"
cli-source = "inotia00/revanced-cli"
rv-brand = "anddea"
patches-version = "dev"
build-mode = "both"
version = "19.16.39"
patcher-args = "-e 'Custom Shorts action buttons' -OiconType='cairo' -e 'Custom branding icon for YouTube' -OappIcon='xisr_yellow' -e 'Overlay buttons' -OiconType='rounded' -OchangeTopButtons='true' -e 'Visual preferences icons for YouTube' -OsettingsMenuIcon='rvx_letters'"
included-patches = "'Custom branding icon for YouTube' 'Custom branding name for YouTube' 'Custom header for YouTube' 'Hide shortcuts'"
apkmirror-dlurl = "https://apkmirror.com/apk/google-inc/youtube/"
uptodown-dlurl = "https://youtube.en.uptodown.com/android"

[Music-anddea]
app-name = "Music"
patches-source = "anddea/revanced-patches"
cli-source = "inotia00/revanced-cli"
rv-brand = "anddea"
patches-version = "dev"
build-mode = "both"
version = "7.16.53"
patcher-args = "-e 'Custom branding icon for YouTube Music' -OappIcon='xisr_yellow' -OrestoreOldSplashIcon='true' -e 'Custom branding name for YouTube Music' -OappNameNotification='Music' -OappNameLauncher='Music'"
included-patches = "'Custom branding icon for YouTube Music' 'Custom branding name for YouTube Music' 'Custom header for YouTube Music'"
apkmirror-dlurl = "https://apkmirror.com/apk/google-inc/youtube-music/"
uptodown-dlurl = "https://youtube-music.en.uptodown.com/android"
arch = "arm64-v8a"

[YouTube2-RV]
app-name = "YouTube2"
rv-brand = "RV"
patcher-args = "-e 'Change header' -Oheader='premium*header'"
included-patches = "'Change header'"
apkmirror-dlurl = "https://apkmirror.com/apk/google-inc/youtube/"
uptodown-dlurl = "https://youtube.en.uptodown.com/android"

[YouTube2-RVX]
app-name = "YouTube2"
patches-source = "inotia00/revanced-patches"
cli-source = "inotia00/revanced-cli"
rv-brand = "RVX"
patches-version = "dev"
version = "19.16.39"
patcher-args = "-e 'Custom Shorts action buttons' -OiconType='outline' -e 'Custom branding icon for YouTube' -OappIcon='afn_blue' -e 'Overlay buttons' -OiconType='thin'"
excluded-patches = "'Custom branding name for YouTube'"
included-patches = "'Custom header for YouTube' 'MaterialYou'"
apkmirror-dlurl = "https://apkmirror.com/apk/google-inc/youtube/"
uptodown-dlurl = "https://youtube.en.uptodown.com/android"

[Music2-RVX]
app-name = "Music2"
patches-source = "inotia00/revanced-patches"
cli-source = "inotia00/revanced-cli"
rv-brand = "RVX"
patches-version = "dev"
version = "7.16.53"
patcher-args = "-e 'Custom branding icon for YouTube Music' -OappIcon='afn_blue' -OrestoreOldSplashIcon='true'"
excluded-patches = "'Custom branding name for YouTube Music'"
included-patches = "'Custom header for YouTube Music'"
apkmirror-dlurl = "https://apkmirror.com/apk/google-inc/youtube-music/"
uptodown-dlurl = "https://youtube-music.en.uptodown.com/android"
arch = "arm64-v8a"
