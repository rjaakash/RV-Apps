enable-magisk-update = true
parallel-jobs = 1

[YouTube-RV]
app-name = "YouTube"
rv-brand = "RV"
patcher-args = "-e 'Change header' -Oheader='premium*header'"
included-patches = "'Change header'"
apkmirror-dlurl = "https://apkmirror.com/apk/google-inc/youtube/"
uptodown-dlurl = "https://youtube.en.uptodown.com/android"

[Photos-RV]
app-name = "Photos"
rv-brand = "RV"
build-mode = "both"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/photos/"
uptodown-dlurl = "https://google-photos.en.uptodown.com/android"
arch = "arm64-v8a"

[YouTube-RVX]
app-name = "YouTube"
patches-source = "inotia00/revanced-patches"
cli-source = "inotia00/revanced-cli"
rv-brand = "RVX"
build-mode = "both"
patcher-args = "-e 'Custom branding icon for YouTube' -OappIcon='revancify_red'"
included-patches = "'Custom header for YouTube' 'MaterialYou'"
apkmirror-dlurl = "https://apkmirror.com/apk/google-inc/youtube/"
uptodown-dlurl = "https://youtube.en.uptodown.com/android"

[Music-RVX]
app-name = "Music"
patches-source = "inotia00/revanced-patches"
cli-source = "inotia00/revanced-cli"
rv-brand = "RVX"
build-mode = "both"
patcher-args = "-e 'Custom branding icon for YouTube Music' -OappIcon='revancify_red' -e 'Custom branding name for YouTube Music' -OappNameNotification='Music' -OappNameLauncher='Music' -e 'Dark theme' -OdarkThemeBackgroundColor='@android:color/black'"
included-patches = "'Custom header for YouTube Music'"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube-music"
uptodown-dlurl = "https://youtube-music.en.uptodown.com/android"
arch = "arm64-v8a"

[YouTube2-RVX]
app-name = "YouTube2"
patches-source = "inotia00/revanced-patches"
cli-source = "inotia00/revanced-cli"
rv-brand = "RVX"
build-mode = "module"
version = "19.16.39"
patcher-args = "-e 'Custom branding icon for YouTube' -OappIcon='mmt' -e 'Overlay buttons' -OiconType='rounded' -OchangeTopButtons='true'"
excluded-patches = "'Spoof streaming data'"
included-patches = "'Custom header for YouTube' 'Hide shortcuts'"
apkmirror-dlurl = "https://apkmirror.com/apk/google-inc/youtube/"
uptodown-dlurl = "https://youtube.en.uptodown.com/android"

[Music2-RVX]
app-name = "Music2"
patches-source = "inotia00/revanced-patches"
cli-source = "inotia00/revanced-cli"
rv-brand = "RVX"
build-mode = "module"
version = "7.16.53"
patcher-args = "-e 'Custom branding icon for YouTube Music' -OappIcon='mmt' -e 'Custom branding name for YouTube Music' -OappNameNotification='Music' -OappNameLauncher='Music' -e 'Dark theme' -OdarkThemeBackgroundColor='@android:color/black'"
excluded-patches = "'Spoof client' 'Spoof streaming data'"
included-patches = "'Custom header for YouTube Music'"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube-music"
uptodown-dlurl = "https://youtube-music.en.uptodown.com/android"
arch = "arm64-v8a"

[YouTube3-RVX]
app-name = "YouTube3"
patches-source = "inotia00/revanced-patches"
cli-source = "inotia00/revanced-cli"
rv-brand = "RVX"
patcher-args = "-e 'Custom Shorts action buttons' -OiconType='outline' -e 'Custom branding icon for YouTube' -OappIcon='afn_blue' -e 'Overlay buttons' -OiconType='thin' -OchangeTopButtons='true'"
excluded-patches = "'Custom branding name for YouTube'"
included-patches = "'Custom header for YouTube' 'MaterialYou'"
apkmirror-dlurl = "https://apkmirror.com/apk/google-inc/youtube/"
uptodown-dlurl = "https://youtube.en.uptodown.com/android"

[Instagram-RVExpt]
app-name = "Instagram"
patches-source = "Aunali321/ReVancedExperiments"
rv-brand = "RVExpt"
apkmirror-dlurl = "https://www.apkmirror.com/apk/instagram/instagram-instagram/"
uptodown-dlurl = "https://instagram.en.uptodown.com/android"
arch = "arm64-v8a"
