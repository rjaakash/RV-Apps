cli-source = "inotia00/revanced-cli"
rv-brand = "RVX"
patcher-args = "-e 'Custom branding icon for YouTube Music' -OappIcon=afn_blue -OrestoreOldSplashIcon=true -e 'Dark theme' -OdarkThemeBackgroundColor=@android:color/black"
